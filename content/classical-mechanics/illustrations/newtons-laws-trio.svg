<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Nunito, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#0d0f14"/>

  <!-- Title -->
  <text x="400" y="36" fill="#f0f2f5" font-size="18" font-weight="700" text-anchor="middle">Newton's Three Laws</text>

  <!-- Panel dividers -->
  <line x1="267" y1="55" x2="267" y2="380" stroke="#252932" stroke-width="2"/>
  <line x1="534" y1="55" x2="534" y2="380" stroke="#252932" stroke-width="2"/>

  <!-- ===== PANEL 1: First Law (Inertia) ===== -->
  <text x="133" y="72" fill="#4caf7d" font-size="14" font-weight="700" text-anchor="middle">1st Law — Inertia</text>

  <!-- Object at rest: block -->
  <rect x="88" y="130" width="90" height="60" rx="8" fill="#252932" stroke="#4caf7d" stroke-width="2"/>
  <text x="133" y="166" fill="#f0f2f5" font-size="15" font-weight="700" text-anchor="middle">m</text>

  <!-- Equal arrows left and right (balanced) -->
  <line x1="60" y1="160" x2="84" y2="160" stroke="#f4b942" stroke-width="3"/>
  <polygon points="84,160 74,154 74,166" fill="#f4b942"/>
  <line x1="182" y1="160" x2="208" y2="160" stroke="#f4b942" stroke-width="3"/>
  <polygon points="208,160 198,154 198,166" fill="#f4b942"/>

  <!-- Ground line -->
  <line x1="70" y1="192" x2="196" y2="192" stroke="#8892a4" stroke-width="2"/>

  <!-- Zero net force label -->
  <text x="133" y="215" fill="#8892a4" font-size="12" text-anchor="middle">ΣF = 0</text>
  <text x="133" y="232" fill="#8892a4" font-size="12" text-anchor="middle">a = 0</text>

  <!-- Velocity arrow: constant -->
  <line x1="100" y1="260" x2="166" y2="260" stroke="#3fc8d4" stroke-width="3"/>
  <polygon points="166,260 154,254 154,266" fill="#3fc8d4"/>
  <text x="133" y="282" fill="#3fc8d4" font-size="13" text-anchor="middle" font-weight="600">v = constant</text>

  <!-- Description -->
  <text x="133" y="320" fill="#f0f2f5" font-size="12" text-anchor="middle">No net force =</text>
  <text x="133" y="338" fill="#f0f2f5" font-size="12" text-anchor="middle">no change in</text>
  <text x="133" y="356" fill="#f0f2f5" font-size="12" text-anchor="middle">motion</text>

  <!-- ===== PANEL 2: Second Law (F=ma) ===== -->
  <text x="400" y="72" fill="#f4b942" font-size="14" font-weight="700" text-anchor="middle">2nd Law — F = ma</text>

  <!-- Block -->
  <rect x="320" y="130" width="90" height="60" rx="8" fill="#252932" stroke="#f4b942" stroke-width="2"/>
  <text x="365" y="166" fill="#f0f2f5" font-size="15" font-weight="700" text-anchor="middle">m</text>

  <!-- Net force arrow (right) -->
  <line x1="415" y1="160" x2="458" y2="160" stroke="#e8547a" stroke-width="4"/>
  <polygon points="458,160 445,153 445,167" fill="#e8547a"/>
  <text x="465" y="157" fill="#e8547a" font-size="14" font-weight="700">F</text>

  <!-- Ground line -->
  <line x1="300" y1="192" x2="470" y2="192" stroke="#8892a4" stroke-width="2"/>

  <!-- Acceleration arrow -->
  <line x1="340" y1="220" x2="400" y2="220" stroke="#f4b942" stroke-width="3"/>
  <polygon points="400,220 388,214 388,226" fill="#f4b942"/>
  <text x="340" y="245" fill="#f4b942" font-size="12" font-weight="600">a = F/m</text>

  <!-- Formula -->
  <rect x="330" y="265" width="140" height="42" rx="8" fill="#252932"/>
  <text x="400" y="292" fill="#f4b942" font-size="22" font-weight="700" text-anchor="middle">F = ma</text>

  <!-- Description -->
  <text x="400" y="330" fill="#f0f2f5" font-size="12" text-anchor="middle">More force =</text>
  <text x="400" y="348" fill="#f0f2f5" font-size="12" text-anchor="middle">more acceleration</text>
  <text x="400" y="366" fill="#f0f2f5" font-size="12" text-anchor="middle">More mass = less</text>

  <!-- ===== PANEL 3: Third Law (Action-Reaction) ===== -->
  <text x="667" y="72" fill="#3fc8d4" font-size="14" font-weight="700" text-anchor="middle">3rd Law — Action-Reaction</text>

  <!-- Object A (left) -->
  <rect x="560" y="130" width="72" height="52" rx="8" fill="#252932" stroke="#4caf7d" stroke-width="2"/>
  <text x="596" y="162" fill="#4caf7d" font-size="14" font-weight="700" text-anchor="middle">A</text>

  <!-- Object B (right) -->
  <rect x="670" y="130" width="72" height="52" rx="8" fill="#252932" stroke="#e8547a" stroke-width="2"/>
  <text x="706" y="162" fill="#e8547a" font-size="14" font-weight="700" text-anchor="middle">B</text>

  <!-- A pushes B: arrow right -->
  <line x1="635" y1="148" x2="665" y2="148" stroke="#4caf7d" stroke-width="3"/>
  <polygon points="665,148 654,142 654,154" fill="#4caf7d"/>
  <text x="650" y="142" fill="#4caf7d" font-size="11" text-anchor="middle" font-weight="600">F_AB</text>

  <!-- B pushes A: arrow left -->
  <line x1="665" y1="168" x2="635" y2="168" stroke="#e8547a" stroke-width="3"/>
  <polygon points="635,168 646,162 646,174" fill="#e8547a"/>
  <text x="650" y="185" fill="#e8547a" font-size="11" text-anchor="middle" font-weight="600">F_BA</text>

  <!-- Ground line -->
  <line x1="548" y1="192" x2="755" y2="192" stroke="#8892a4" stroke-width="2"/>

  <!-- Equal sign and opposite -->
  <text x="667" y="220" fill="#3fc8d4" font-size="14" text-anchor="middle" font-weight="600">|F_AB| = |F_BA|</text>
  <text x="667" y="240" fill="#3fc8d4" font-size="14" text-anchor="middle" font-weight="600">opposite directions</text>

  <!-- Formula -->
  <rect x="567" y="260" width="200" height="42" rx="8" fill="#252932"/>
  <text x="667" y="287" fill="#3fc8d4" font-size="16" font-weight="700" text-anchor="middle">F_AB = −F_BA</text>

  <!-- Description -->
  <text x="667" y="330" fill="#f0f2f5" font-size="12" text-anchor="middle">Every force has</text>
  <text x="667" y="348" fill="#f0f2f5" font-size="12" text-anchor="middle">an equal and</text>
  <text x="667" y="366" fill="#f0f2f5" font-size="12" text-anchor="middle">opposite reaction</text>
</svg>
