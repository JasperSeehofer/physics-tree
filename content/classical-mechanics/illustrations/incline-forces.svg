<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Nunito, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#0d0f14"/>

  <!-- Title -->
  <text x="400" y="36" fill="#f0f2f5" font-size="18" font-weight="700" text-anchor="middle">Forces on an Inclined Plane</text>

  <!-- Inclined plane surface -->
  <polygon points="120,340 560,340 560,120" fill="#1a1d24" stroke="#252932" stroke-width="2"/>
  <!-- Hatching marks on surface -->
  <line x1="120" y1="340" x2="560" y2="120" stroke="#252932" stroke-width="2"/>
  <line x1="130" y1="350" x2="140" y2="340" stroke="#8892a4" stroke-width="1.5"/>
  <line x1="175" y1="350" x2="185" y2="340" stroke="#8892a4" stroke-width="1.5"/>
  <line x1="220" y1="350" x2="230" y2="340" stroke="#8892a4" stroke-width="1.5"/>
  <line x1="265" y1="350" x2="275" y2="340" stroke="#8892a4" stroke-width="1.5"/>
  <line x1="310" y1="350" x2="320" y2="340" stroke="#8892a4" stroke-width="1.5"/>

  <!-- Ground floor -->
  <rect x="100" y="340" width="480" height="20" rx="0" fill="#252932"/>

  <!-- Angle arc and label -->
  <path d="M 200 340 A 60 60 0 0 1 178 298" fill="none" stroke="#f4b942" stroke-width="2"/>
  <text x="215" y="325" fill="#f4b942" font-size="16" font-weight="700">θ</text>

  <!-- Block on slope (rotated 30 degrees along slope) -->
  <!-- Block center at approximately 340, 230 on the slope -->
  <g transform="translate(340,230) rotate(-27)">
    <rect x="-35" y="-25" width="70" height="50" rx="6" fill="#252932" stroke="#4caf7d" stroke-width="2.5"/>
    <text x="0" y="7" fill="#f0f2f5" font-size="16" font-weight="700" text-anchor="middle">m</text>
  </g>

  <!-- Gravity force: straight down (from block center) -->
  <line x1="340" y1="230" x2="340" y2="310" stroke="#e8547a" stroke-width="3"/>
  <polygon points="340,310 334,298 346,298" fill="#e8547a"/>
  <text x="360" y="295" fill="#e8547a" font-size="14" font-weight="700">W = mg</text>

  <!-- Normal force: perpendicular to slope (up-right from block) -->
  <!-- Normal direction is perpendicular to slope: slope angle ~27 deg, normal ~63 deg from horizontal -->
  <line x1="340" y1="230" x2="377" y2="147" stroke="#4caf7d" stroke-width="3"/>
  <polygon points="377,147 364,157 373,168" fill="#4caf7d"/>
  <text x="388" y="148" fill="#4caf7d" font-size="14" font-weight="700">N</text>

  <!-- Friction force: up the slope (upper-left from block) -->
  <line x1="340" y1="230" x2="280" y2="178" stroke="#3fc8d4" stroke-width="3"/>
  <polygon points="280,178 292,188 293,175" fill="#3fc8d4"/>
  <text x="245" y="168" fill="#3fc8d4" font-size="14" font-weight="700">f</text>
  <text x="228" y="185" fill="#3fc8d4" font-size="11">(friction)</text>

  <!-- Weight component parallel to slope (down the slope) -->
  <line x1="340" y1="230" x2="400" y2="285" stroke="#f4b942" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="400,285 390,273 402,271" fill="#f4b942"/>
  <text x="408" y="280" fill="#f4b942" font-size="12" font-weight="600">mg sin θ</text>

  <!-- Weight component perpendicular to slope (into slope) -->
  <line x1="340" y1="230" x2="302" y2="312" stroke="#f4b942" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="302,312 300,298 312,302" fill="#f4b942"/>
  <text x="246" y="316" fill="#f4b942" font-size="12" font-weight="600">mg cos θ</text>

  <!-- Legend box -->
  <rect x="590" y="70" width="185" height="160" rx="8" fill="#1a1d24" stroke="#252932" stroke-width="1.5"/>
  <text x="682" y="92" fill="#f0f2f5" font-size="13" font-weight="700" text-anchor="middle">Force Legend</text>
  <!-- Normal -->
  <line x1="608" y1="112" x2="636" y2="112" stroke="#4caf7d" stroke-width="3"/>
  <polygon points="636,112 625,107 625,117" fill="#4caf7d"/>
  <text x="644" y="117" fill="#4caf7d" font-size="12" font-weight="600">Normal (N)</text>
  <!-- Gravity -->
  <line x1="608" y1="138" x2="636" y2="138" stroke="#e8547a" stroke-width="3"/>
  <polygon points="636,138 625,133 625,143" fill="#e8547a"/>
  <text x="644" y="143" fill="#e8547a" font-size="12" font-weight="600">Weight (mg)</text>
  <!-- Friction -->
  <line x1="608" y1="164" x2="636" y2="164" stroke="#3fc8d4" stroke-width="3"/>
  <polygon points="636,164 625,159 625,169" fill="#3fc8d4"/>
  <text x="644" y="169" fill="#3fc8d4" font-size="12" font-weight="600">Friction (f)</text>
  <!-- Components -->
  <line x1="608" y1="190" x2="636" y2="190" stroke="#f4b942" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="636,190 625,185 625,195" fill="#f4b942"/>
  <text x="644" y="195" fill="#f4b942" font-size="12" font-weight="600">Components</text>
  <text x="644" y="210" fill="#f4b942" font-size="11">(of weight)</text>
</svg>
