<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Nunito, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#0d0f14"/>

  <!-- Title -->
  <text x="400" y="36" fill="#f0f2f5" font-size="18" font-weight="700" text-anchor="middle">Orbital Paths</text>

  <!-- Central body (sun) -->
  <circle cx="300" cy="210" r="30" fill="#f4b942"/>
  <!-- Sun glow ring -->
  <circle cx="300" cy="210" r="40" fill="none" stroke="#f4b942" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="210" r="50" fill="none" stroke="#f4b942" stroke-width="1" opacity="0.2"/>
  <text x="300" y="268" fill="#f4b942" font-size="13" text-anchor="middle" font-weight="600">Star / Planet</text>

  <!-- Circular orbit (solid green) -->
  <circle cx="300" cy="210" r="120" fill="none" stroke="#4caf7d" stroke-width="2.5"/>

  <!-- Circular orbit label -->
  <text x="134" y="150" fill="#4caf7d" font-size="13" font-weight="600">Circular orbit</text>

  <!-- Circular orbit velocity vector (at top of circle) -->
  <line x1="300" y1="90" x2="340" y2="90" stroke="#4caf7d" stroke-width="2.5"/>
  <polygon points="340,90 328,84 328,96" fill="#4caf7d"/>

  <!-- Small body on circular orbit -->
  <circle cx="300" cy="90" r="8" fill="#4caf7d"/>

  <!-- Elliptical orbit (dashed teal) - centered slightly left of star -->
  <ellipse cx="260" cy="210" rx="200" ry="110" fill="none" stroke="#3fc8d4" stroke-width="2" stroke-dasharray="10,5"/>

  <!-- Elliptical orbit label -->
  <text x="605" y="170" fill="#3fc8d4" font-size="13" font-weight="600">Elliptical orbit</text>
  <!-- Arrow pointing to ellipse -->
  <line x1="600" y1="174" x2="580" y2="185" stroke="#3fc8d4" stroke-width="1.5"/>
  <polygon points="580,185 586,175 592,184" fill="#3fc8d4"/>

  <!-- Small body on elliptical orbit (near periapsis, right side) -->
  <circle cx="460" cy="210" r="7" fill="#3fc8d4"/>
  <!-- Velocity vector at periapsis (upward) -->
  <line x1="460" y1="210" x2="460" y2="172" stroke="#3fc8d4" stroke-width="2"/>
  <polygon points="460,172 454,184 466,184" fill="#3fc8d4"/>

  <!-- Focus marker (star is near one focus) -->
  <text x="260" y="210" fill="#8892a4" font-size="11" text-anchor="middle" font-weight="600">F₁</text>
  <circle cx="220" cy="210" r="3" fill="#8892a4"/>
  <text x="305" y="210" fill="#8892a4" font-size="11" font-weight="600">F₂</text>
  <circle cx="300" cy="210" r="3" fill="#8892a4"/>

  <!-- Escape trajectory (dotted pink) - parabolic/hyperbolic leaving the scene -->
  <path d="M 180 340 Q 260 230 320 175 Q 380 120 500 80" fill="none" stroke="#e8547a" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- Escape trajectory label -->
  <text x="512" y="75" fill="#e8547a" font-size="13" font-weight="600">Escape</text>
  <text x="512" y="91" fill="#e8547a" font-size="13" font-weight="600">trajectory</text>

  <!-- Small body on escape trajectory -->
  <circle cx="500" cy="80" r="7" fill="#e8547a"/>
  <!-- Velocity vector on escape path -->
  <line x1="500" y1="80" x2="536" y2="60" stroke="#e8547a" stroke-width="2"/>
  <polygon points="536,60 523,63 526,75" fill="#e8547a"/>

  <!-- Legend -->
  <rect x="600" y="270" width="175" height="110" rx="8" fill="#1a1d24" stroke="#252932" stroke-width="1.5"/>
  <text x="688" y="290" fill="#f0f2f5" font-size="12" text-anchor="middle" font-weight="700">Legend</text>
  <line x1="616" y1="308" x2="645" y2="308" stroke="#4caf7d" stroke-width="2.5"/>
  <text x="652" y="312" fill="#4caf7d" font-size="12" font-weight="600">Circular</text>
  <line x1="616" y1="330" x2="645" y2="330" stroke="#3fc8d4" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="652" y="334" fill="#3fc8d4" font-size="12" font-weight="600">Elliptical</text>
  <line x1="616" y1="352" x2="645" y2="352" stroke="#e8547a" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="652" y="356" fill="#e8547a" font-size="12" font-weight="600">Escape</text>
</svg>
